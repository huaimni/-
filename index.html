<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《撸记》</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --skin-color: #ffb7a1;
            --skin-dark: #e89b85;
            --head-color: #ff8a8a;
            --head-dark: #f07575;
            --blood-color: rgba(220, 20, 60, 0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a0a0a;
            color: #e2e8f0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        .header {
            height: 10vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        .game-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .shaft-container {
            position: relative;
            width: 80px;
            height: 350px;
            margin-bottom: 20px;
        }

        .base-parts {
            position: absolute;
            bottom: -30px;
            width: 150px;
            left: -35px;
            display: flex;
            justify-content: space-between;
            z-index: 5;
        }

        .testi {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, var(--skin-color), var(--skin-dark));
            border-radius: 50%;
            box-shadow: inset -5px -5px 15px rgba(0, 0, 0, 0.4), 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .shaft-wrapper {
            position: absolute;
            bottom: 0;
            width: 80px;
            height: 320px;
            z-index: 10;
            border-radius: 40px 40px 15px 15px;
            overflow: hidden;
            background-color: var(--skin-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .shaft-skin {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.1) 0%, var(--skin-color) 20%, var(--skin-color) 80%, rgba(0, 0, 0, 0.15) 100%);
        }

        .glans {
            position: absolute;
            top: 0;
            width: 100%;
            height: 70px;
            background: radial-gradient(circle at 50% 40%, var(--head-color), var(--head-dark));
            border-radius: 45% 45% 35% 35%;
            border-bottom: 2px solid rgba(139, 0, 0, 0.15);
            z-index: 5;
        }

        .meatus {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 14px;
            background: rgba(100, 0, 0, 0.3);
            border-radius: 50%;
        }

        #progress-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, rgba(255, 0, 50, 0.6), rgba(255, 100, 100, 0.3));
            z-index: 10;
            pointer-events: none;
            transition: height 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2) inset;
        }

        .footer {
            height: 20vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: linear-gradient(to top, #0a0a0a 70%, transparent);
            padding-bottom: 20px;
        }

        .stroke-animation {
            animation: strokeAction 0.1s ease-in-out;
        }

        @keyframes strokeAction {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(18px) scaleX(1.03);
            }

            100% {
                transform: translateY(0);
            }
        }

        .extreme-shaking {
            animation: finalShake 0.04s infinite;
        }

        @keyframes finalShake {
            0% {
                transform: translate(1px, 1px);
            }

            33% {
                transform: translate(-2px, 0px);
            }

            66% {
                transform: translate(1px, -2px);
            }

            100% {
                transform: translate(0px, 1px);
            }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 100;
        }

        #finish-overlay {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <canvas id="fireworks"></canvas>

    <div class="header">
        <h1 class="text-3xl font-black tracking-widest text-red-600">《撸记》</h1>
        <p class="text-gray-500 text-xs mt-1">“每晚撸之，撸之撸之...”</p>
    </div>

    <div class="game-main">
        <div id="target-area" class="shaft-container">
            <div class="base-parts">
                <div class="testi"></div>
                <div class="testi"></div>
            </div>
            <div id="shaft-body" class="shaft-wrapper">
                <div class="shaft-skin"></div>
                <div class="glans">
                    <div class="meatus"></div>
                </div>
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p id="percent-display" class="mb-4 text-2xl font-mono font-bold text-red-500">快感：0%</p>
        <button id="btn-stroke"
            class="bg-white text-black font-black py-4 px-14 rounded-2xl text-2xl shadow-[0_8px_0_#999] active:shadow-none active:translate-y-[8px] transition-all outline-none">
            撸 之 ！
        </button>
    </div>

    <div id="finish-overlay" class="fixed inset-0 flex items-center justify-center hidden z-[200]">
        <h2 class="text-8xl font-black text-black animate-pulse">爽也</h2>
    </div>

    <script>
        const btn = document.getElementById('btn-stroke');
        const shaft = document.getElementById('shaft-body');
        const fill = document.getElementById('progress-fill');
        const percentText = document.getElementById('percent-display');
        const overlay = document.getElementById('finish-overlay');
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');

        let energy = 0;
        let particles = [];
        let isDone = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        class Particle {
            constructor(x, y, power = 1) {
                this.x = x;
                this.y = y;
                const angle = (Math.PI * 1.5) + (Math.random() - 0.5) * 0.3;
                const speed = (Math.random() * 18 + 12) * power;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() < 0.2 ? (Math.random() * 9 + 6) : (Math.random() * 5 + 3);
                this.life = 1.0;
                this.gravity = 0.5;
                this.baseColor = "255, 255, 255";
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                const rotation = Math.atan2(this.vy, this.vx);
                ctx.rotate(rotation);
                ctx.beginPath();
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const stretch = Math.min(speed * 0.18, 2.5);
                ctx.ellipse(0, 0, this.radius * (1 + stretch), this.radius, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.baseColor}, ${this.life})`;
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.4, this.radius * 0.2, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.life * 0.8})`;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life -= 0.006;
                if (this.radius > 0.5) this.radius -= 0.01;
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }
        loop();

        function getMouthPos() {
            const rect = shaft.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + 15
            };
        }

        btn.addEventListener('click', () => {
            if (overlay.classList.contains('hidden')) {
                shaft.classList.remove('stroke-animation');
                void shaft.offsetWidth;
                shaft.classList.add('stroke-animation');
            }

            if (isDone) {
                const pos = getMouthPos();
                for (let i = 0; i < 10; i++) particles.push(new Particle(pos.x, pos.y, 0.6));
                return;
            }

            energy += 5.5;
            if (energy > 100) energy = 100;
            updateUI();
        });

        function updateUI() {
            fill.style.height = energy + '%';
            percentText.innerText = `快感：${Math.floor(energy)}%`;

            fill.style.backgroundColor = `rgba(220, 20, 60, ${0.2 + (energy / 100) * 0.4})`;

            if (energy > 85) {
                shaft.classList.add('extreme-shaking');
            } else {
                shaft.classList.remove('extreme-shaking');
            }
            if (energy >= 100 && !isDone) {
                ejaculateProcess();
            }
        }

        async function ejaculateProcess() {
            isDone = true;

            spawnBurst(70, 1.5);
            await sleep(450);

            spawnBurst(60, 1.2);
            await sleep(550);

            spawnBurst(90, 1.0);

            await sleep(1000);

            overlay.classList.remove('hidden');

            setTimeout(() => {
                shaft.classList.remove('extreme-shaking');
                reset();
            }, 2000);
        }

        function spawnBurst(num, power) {
            const pos = getMouthPos();
            let count = 0;
            const interval = setInterval(() => {
                particles.push(new Particle(pos.x, pos.y, power));
                particles.push(new Particle(pos.x + (Math.random() - 0.5) * 8, pos.y, power * 0.85));
                count += 2;
                if (count >= num) clearInterval(interval);
            }, 12);
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function reset() {
            energy = 0;
            isDone = false;
            overlay.classList.add('hidden');
            updateUI();
        }

        setInterval(() => {
            if (energy > 0 && !isDone) {
                energy -= 0.7;
                updateUI();
            }
        }, 200);
    </script>
</body>

</html>
